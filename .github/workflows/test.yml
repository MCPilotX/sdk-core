name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint || echo "Linting failed but continuing with tests"
    
    - name: Run tests with coverage
      run: npm test -- --coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
    
    - name: Run security tests
      run: npm test -- tests/security.test.ts
    
    - name: Run MCP module tests
      run: npm test -- tests/mcp-tool-registry.test.ts

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build project
      run: npm run build
    
    - name: Run integration tests
      run: |
        # Run example tests
        npm test -- examples/end-to-end-test.ts || echo "Integration test failed"
        
        # Run all examples to ensure they work
        for file in examples/*.js examples/*.ts; do
          if [[ -f "$file" && "$file" != *"ts-build"* ]]; then
            echo "Testing $file"
            node "$file" || echo "$file failed but continuing"
          fi
        done
    
    - name: Archive test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          coverage/
          test-results.xml

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run npm audit
      run: npm audit --audit-level=high || echo "Security vulnerabilities found"
    
    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'IntentOrch'
        path: '.'
        format: 'HTML'
        out: 'reports'
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/

  performance-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run performance tests
      run: |
        # Simple performance test - run tests multiple times and measure
        echo "Running performance benchmark..."
        time npm test -- --testTimeout=30000
        
        # Run specific performance-sensitive tests
        echo "Running tool execution performance tests..."
        for i in {1..10}; do
          npm test -- tests/mcp-tool-registry.test.ts --testNamePattern="Tool Execution" --silent
        done | grep -E "(PASS|FAIL|✓|✕)" | tail -5
    
    - name: Check for memory leaks
      run: |
        # Run tests with memory profiling
        node --max-old-space-size=512 --expose-gc $(which npm) test -- --runInBand --logHeapUsage || echo "Memory test completed"

  notify:
    runs-on: ubuntu-latest
    needs: [test, integration-test, security-scan, performance-test]
    if: always()
    
    steps:
    - name: Send notification
      run: |
        echo "All test jobs completed"
        echo "Test job status: ${{ needs.test.result }}"
        echo "Integration test status: ${{ needs.integration-test.result }}"
        echo "Security scan status: ${{ needs.security-scan.result }}"
        echo "Performance test status: ${{ needs.performance-test.result }}"