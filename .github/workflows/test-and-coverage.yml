name: Test & Coverage Badge

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests & update coverage badge
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Allow pushing code (update badge file)
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=json-summary --coverageReporters=text
        
      - name: Extract coverage data
        id: coverage
        run: |
          # Extract coverage from Jest's coverage-summary.json
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "Error: coverage/coverage-summary.json not found"
            echo "coverage=0" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Parse line coverage percentage and round to integer
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          COVERAGE=${COVERAGE%.*}
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
          
          # Choose color based on coverage percentage
          if [ $COVERAGE -ge 90 ]; then COLOR="brightgreen"
          elif [ $COVERAGE -ge 80 ]; then COLOR="green"
          elif [ $COVERAGE -ge 70 ]; then COLOR="yellowgreen"
          elif [ $COVERAGE -ge 60 ]; then COLOR="yellow"
          elif [ $COVERAGE -ge 50 ]; then COLOR="orange"
          else COLOR="red"
          fi
          echo "color=${COLOR}" >> $GITHUB_OUTPUT
          
      - name: Display coverage
        run: |
          echo "Current test coverage: ${{ steps.coverage.outputs.coverage }}%"
          echo "Badge color: ${{ steps.coverage.outputs.color }}"
          
      - name: Generate coverage badge
        run: |
          # Create badges directory if it doesn't exist
          mkdir -p badges
          
          # Generate SVG badge
          curl -o badges/coverage.svg \
            "https://img.shields.io/badge/coverage-${{ steps.coverage.outputs.coverage }}%25-${{ steps.coverage.outputs.color }}"
          
      - name: Commit and push badge update
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add badges/coverage.svg
          git diff --staged --quiet || git commit -m "chore: auto update test coverage badge to ${{ steps.coverage.outputs.coverage }}% [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
